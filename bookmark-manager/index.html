<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark Manager</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/bookmarks.css">
  <link rel="stylesheet" href="styles/modal.css">
  <link rel="stylesheet" href="styles/toast.css">
  <link rel="stylesheet" href="styles/tags.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Bookmarks</h1>
    <button id="open-modal-btn" class="btn btn-primary">+ Add Bookmark</button>
  </header>

  <main class="app-main">
    <div id="tag-filters" class="tag-filters hidden"></div>
    <div id="bookmark-list" class="bookmark-list"></div>
    <p id="empty-state" class="empty-state hidden"></p>
  </main>

  <!-- Add bookmark modal -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title">Add Bookmark</h2>
        <button id="modal-close-btn" class="modal-close" aria-label="Close">&times;</button>
      </div>
      <form id="add-bookmark-form" class="modal-form" novalidate>
        <div class="form-group">
          <label for="input-url" class="form-label">URL <span class="required">*</span></label>
          <input type="url" id="input-url" name="url" class="form-input" placeholder="https://example.com" required>
          <span id="url-error" class="form-error hidden"></span>
        </div>
        <div class="form-group">
          <label for="input-title" class="form-label">Title <span class="required">*</span></label>
          <input type="text" id="input-title" name="title" class="form-input" placeholder="Bookmark title" required>
          <span id="title-error" class="form-error hidden"></span>
        </div>
        <div class="form-group">
          <label for="input-note" class="form-label">Note</label>
          <textarea id="input-note" name="note" class="form-input form-textarea" placeholder="Optional description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="input-tags" class="form-label">Tags</label>
          <input type="text" id="input-tags" name="tags" class="form-input" placeholder="design, tools, reference">
          <span class="form-hint">Comma-separated</span>
        </div>
        <div class="modal-actions">
          <button type="button" id="modal-cancel-btn" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Bookmark card template -->
  <template id="bookmark-item-template">
    <article class="bookmark-item">
      <div class="bookmark-row">
        <div class="bookmark-body">
          <a class="bookmark-title" target="_blank" rel="noopener noreferrer"></a>
          <span class="bookmark-domain"></span>
          <p class="bookmark-note hidden"></p>
          <div class="bookmark-tags hidden"></div>
        </div>
        <div class="bookmark-actions">
          <button class="btn-icon edit-btn" aria-label="Edit bookmark">✎</button>
          <button class="btn-icon delete-btn" aria-label="Delete bookmark">✕</button>
        </div>
      </div>
    </article>
  </template>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
